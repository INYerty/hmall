<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI商品顾问 - 黑马商城</title>
    <link rel="stylesheet" type="text/css" href="css/webbase2.css"/>
    <link rel="stylesheet" type="text/css" href="css/pages-index.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
        }

        .ai-container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .ai-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .ai-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .ai-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .ai-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        /* 聊天模块 */
        .chat-module {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            height: 600px;
            background: #fafafa;
        }

        .chat-header {
            background: #f0f0f0;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            border-radius: 8px 8px 0 0;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #333;
            display: flex;
            align-items: center;
        }

        .chat-header h2 i {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #667eea;
            color: white;
            margin-right: 0;
        }

        .message.ai {
            align-self: flex-start;
            background: #e8e8e8;
            color: #333;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #999;
            font-size: 12px;
            text-align: center;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            background: white;
            border-radius: 0 0 8px 8px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .input-group button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .input-group button:hover {
            background: #5568d3;
        }

        .input-group button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 推荐模块 */
        .recommend-module {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
            display: flex;
            flex-direction: column;
        }

        .recommend-header {
            background: #f0f0f0;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .recommend-header h2 {
            font-size: 18px;
            color: #333;
        }

        .recommend-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .product-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .product-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .product-reason {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .product-price {
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .product-actions button {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #667eea;
            border-radius: 4px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .product-actions button:hover {
            background: #667eea;
            color: white;
        }

        /* 功能区 */
        .features-section {
            grid-column: 1 / -1;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
        }

        .features-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .feature-card {
            text-align: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .feature-card:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .feature-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 12px;
            color: #666;
        }

        /* 预约模块 */
        .reservation-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .reservation-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            border: none;
            background: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-actions .cancel-btn {
            background: #f0f0f0;
            color: #333;
        }

        .modal-actions .cancel-btn:hover {
            background: #e0e0e0;
        }

        .modal-actions .submit-btn {
            background: #667eea;
            color: white;
        }

        .modal-actions .submit-btn:hover {
            background: #5568d3;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .ai-content {
                grid-template-columns: 1fr;
            }

            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            animation: loading 1s infinite;
            margin-left: 4px;
        }

        @keyframes loading {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
<div id="consultantApp">
    <!-- 头部导航 -->
    <top></top>

    <!-- AI顾问容器 -->
    <div class="ai-container">
        <!-- 头部 -->
        <div class="ai-header">
            <h1>🤖 AI商品顾问</h1>
            <p>让AI帮助你找到最适合的商品</p>
        </div>

        <!-- 主内容区 -->
        <div class="ai-content">
            <!-- 左侧：聊天模块 -->
            <div class="chat-module">
                <div class="chat-header">
                    <h2><i></i>在线聊天</h2>
                </div>
                <div class="chat-messages" ref="chatMessages">
                    <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.type]">
                        {{ msg.content }}
                    </div>
                    <div v-if="messages.length === 0" class="message system">欢迎使用AI商品顾问，我可以帮你推荐商品或回答购物相关问题</div>
                </div>
                <div class="chat-input-area">
                    <div class="input-group">
                        <input
                            type="text"
                            v-model="userMessage"
                            @keyup.enter="sendMessage"
                            placeholder="输入你的问题或需求..."
                            :disabled="loading"
                        >
                        <button @click="sendMessage" :disabled="loading || !userMessage.trim()">
                            {{ loading ? '发送中...' : '发送' }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧：推荐模块 -->
            <div class="recommend-module">
                <div class="recommend-header">
                    <h2>📦 商品推荐</h2>
                </div>
                <div class="recommend-content">
                    <template v-if="recommendations.length > 0">
                        <div v-for="(product, index) in recommendations" :key="index" class="product-item">
                            <div class="product-name">{{ product.name }}</div>
                            <div class="product-reason">💡 {{ product.reason }}</div>
                            <div class="product-price">¥{{ product.price }}</div>
                            <div class="product-actions">
                                <button @click="addToCart(product)">加入购物车</button>
                                <button @click="viewProduct(product)">查看详情</button>
                            </div>
                        </div>
                    </template>
                    <div v-else style="text-align: center; color: #999; padding: 40px 20px;">
                        <div style="font-size: 40px; margin-bottom: 10px;">📋</div>
                        <div>还没有推荐，试试和AI对话吧！</div>
                    </div>
                </div>
            </div>

            <!-- 功能区 -->
            <div class="features-section">
                <div class="features-title">✨ 快速功能</div>
                <div class="features-grid">
                    <div class="feature-card" @click="quickQuery('推荐性价比高的手机')">
                        <div class="feature-icon">📱</div>
                        <div class="feature-name">手机推荐</div>
                        <div class="feature-desc">为你推荐热门手机</div>
                    </div>
                    <div class="feature-card" @click="quickQuery('推荐时尚的女装')">
                        <div class="feature-icon">👗</div>
                        <div class="feature-name">服装推荐</div>
                        <div class="feature-desc">找到适合你的风格</div>
                    </div>
                    <div class="feature-card" @click="quickQuery('推荐家居用品')">
                        <div class="feature-icon">🏠</div>
                        <div class="feature-name">家居用品</div>
                        <div class="feature-desc">打造舒适家居</div>
                    </div>
                    <div class="feature-card" @click="showReservationModal = true">
                        <div class="feature-icon">📅</div>
                        <div class="feature-name">在线预约</div>
                        <div class="feature-desc">预约购物顾问</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预约模态框 -->
    <div :class="['reservation-modal', {active: showReservationModal}]">
        <div class="modal-content">
            <div class="modal-header">
                <span>📅 预约购物顾问</span>
                <button class="close-btn" @click="showReservationModal = false">×</button>
            </div>
            <form @submit.prevent="submitReservation">
                <div class="form-group">
                    <label for="name">您的姓名</label>
                    <input id="name" type="text" v-model="reservation.name" required>
                </div>
                <div class="form-group">
                    <label for="phone">联系电话</label>
                    <input id="phone" type="tel" v-model="reservation.phone" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input id="email" type="email" v-model="reservation.email">
                </div>
                <div class="form-group">
                    <label for="date">预约日期</label>
                    <input id="date" type="date" v-model="reservation.date" required>
                </div>
                <div class="form-group">
                    <label for="time">预约时间</label>
                    <select id="time" v-model="reservation.time" required>
                        <option value="">请选择时间</option>
                        <option value="09:00">09:00 - 10:00</option>
                        <option value="10:00">10:00 - 11:00</option>
                        <option value="14:00">14:00 - 15:00</option>
                        <option value="15:00">15:00 - 16:00</option>
                        <option value="16:00">16:00 - 17:00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">购物类别</label>
                    <select id="category" v-model="reservation.category" required>
                        <option value="">请选择类别</option>
                        <option value="electronics">电子产品</option>
                        <option value="clothing">服装鞋帽</option>
                        <option value="home">家居用品</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">备注信息</label>
                    <textarea id="notes" v-model="reservation.notes" placeholder="请告诉我们你的需求..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" @click="showReservationModal = false">取消</button>
                    <button type="submit" class="submit-btn" :disabled="reservationLoading">
                        {{ reservationLoading ? '提交中...' : '确认预约' }}
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 页脚 -->
    <foot></foot>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/common.js"></script>
<script>
    // 覆盖 axios baseURL，AI 接口不使用 /api 前缀
    axios.defaults.baseURL = "";
</script>
<script src="./js/top.js"></script>
<script src="./js/copyright.js"></script>
<script src="./js/foot.js"></script>
<script>
    const consultantApp = new Vue({
        el: '#consultantApp',
        data() {
            return {
                userMessage: '',
                messages: [],
                recommendations: [],
                loading: false,
                memoryId: this.generateMemoryId(),
                showReservationModal: false,
                reservationLoading: false,
                reservation: {
                    name: '',
                    phone: '',
                    email: '',
                    date: '',
                    time: '',
                    category: '',
                    notes: ''
                }
            }
        },
        methods: {
            generateMemoryId() {
                return 'mem_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            },
            sendMessage() {
                if (!this.userMessage.trim()) return;

                // 添加用户消息
                this.messages.push({
                    type: 'user',
                    content: this.userMessage
                });

                const userInput = this.userMessage;
                this.userMessage = '';
                this.loading = true;

                // 调用聊天API
                this.fetchChatResponse(userInput);
            },
            fetchChatResponse(message) {
                const url = `/ai-api/chat?memoryId=${this.memoryId}&message=${encodeURIComponent(message)}`;
                const eventSource = new EventSource(url);
                
                let aiMessage = '';
                let isFirstChunk = true;

                eventSource.onmessage = (event) => {
                    const data = event.data;
                    if (data) {
                        aiMessage += data;
                        
                        // 首次接收时创建消息占位
                        if (isFirstChunk) {
                            this.messages.push({
                                type: 'ai',
                                content: aiMessage
                            });
                            isFirstChunk = false;
                        } else {
                            // 更新最后一条 AI 消息
                            this.messages[this.messages.length - 1].content = aiMessage;
                        }
                        
                        // 滚动到底部
                        this.$nextTick(() => {
                            this.$refs.chatMessages.scrollTop = this.$refs.chatMessages.scrollHeight;
                        });
                    }
                };

                eventSource.onerror = (err) => {
                    console.error('SSE Error:', err);
                    eventSource.close();
                    
                    if (!aiMessage) {
                        this.messages.push({
                            type: 'ai',
                            content: '抱歉，服务暂时不可用，请稍后再试'
                        });
                    }
                    
                    this.loading = false;
                    this.fetchRecommendations(message);
                };

                eventSource.addEventListener('complete', () => {
                    eventSource.close();
                    this.loading = false;
                    this.fetchRecommendations(message);
                });
            },
            fetchRecommendations(userRequest) {
                axios.get('/ai-api/recommend/items').then(response => {
                    const items = Array.isArray(response.data) ? response.data : [];
                    this.recommendations = items.map(item => {
                        const price = item.price != null ? (item.price / 100).toFixed(2) : '0.00';
                        const brand = item.brand || '未知';
                        const category = item.category || '未知';
                        const sold = item.sold != null ? item.sold : 0;
                        return {
                            id: item.id,
                            name: item.name,
                            reason: `品牌：${brand} · 类目：${category} · 销量：${sold}`,
                            price: price
                        };
                    });
                    this.loading = false;
                    this.$nextTick(() => {
                        this.$refs.chatMessages.scrollTop = this.$refs.chatMessages.scrollHeight;
                    });
                }).catch(err => {
                    console.error(err);
                    this.loading = false;
                });
            },
            quickQuery(query) {
                this.userMessage = query;
                this.sendMessage();
            },
            addToCart(product) {
                alert('已添加到购物车：' + product.name);
            },
            viewProduct(product) {
                alert('查看商品详情：' + product.name);
            },
            submitReservation() {
                this.reservationLoading = true;

                // 检查必填字段
                if (!this.reservation.name || !this.reservation.phone || !this.reservation.date || !this.reservation.time || !this.reservation.category) {
                    alert('请填写所有必填字段！');
                    this.reservationLoading = false;
                    return;
                }

                // 构建查询参数对象（不用FormData，直接用params）
                const params = {
                    name: this.reservation.name,
                    phone: this.reservation.phone,
                    email: this.reservation.email,
                    date: this.reservation.date,
                    time: this.reservation.time,
                    category: this.reservation.category,
                    notes: this.reservation.notes || ''
                };

                console.log('提交预约数据:', params);

                // 调用后端 API（使用params方式）
                axios.post('/reservation/add', null, {params: params})
                    .then(response => {
                        console.log('预约响应:', response.data);
                        if (response.data.success) {
                            alert(response.data.message);
                            this.showReservationModal = false;
                            // 重置表单
                            this.reservation = {
                                name: '',
                                phone: '',
                                email: '',
                                date: '',
                                time: '',
                                category: '',
                                notes: ''
                            };
                        } else {
                            alert('错误：' + response.data.message);
                        }
                        this.reservationLoading = false;
                    })
                    .catch(err => {
                        console.error('预约失败:', err.response?.data || err.message);
                        alert('预约失败：' + (err.response?.data?.message || err.message || '请检查网络连接'));
                        this.reservationLoading = false;
                    });
            }
        },
        mounted() {
            // 添加欢迎消息
            this.$nextTick(() => {
                this.$refs.chatMessages.scrollTop = this.$refs.chatMessages.scrollHeight;
            });
        }
    });
</script>
</body>
</html>
