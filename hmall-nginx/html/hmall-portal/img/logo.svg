<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff8e1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="196" height="56" rx="10" ry="10" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 购物袋图标 -->
  <g transform="translate(15, 12)">
    <path d="M 8 15 L 8 40 Q 8 45 13 45 L 27 45 Q 32 45 32 40 L 32 15 Z" 
          fill="#ffd54f" stroke="#f9a825" stroke-width="1.5"/>
    <path d="M 13 15 L 13 10 Q 13 5 20 5 Q 27 5 27 10 L 27 15" 
          fill="none" stroke="#f9a825" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="30" r="3" fill="#ff6b35"/>
  </g>
  
  <!-- "乐购" 大字 -->
  <text x="65" y="40" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" font-weight="bold" fill="url(#textGrad)" filter="url(#shadow)">乐购</text>
  
  <!-- "商城" 小字 -->
  <text x="140" y="38" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="normal" fill="#ffe0b2">商城</text>
  
  <!-- 装饰小星 -->
  <circle cx="180" cy="20" r="2" fill="#ffd54f"/>
  <circle cx="188" cy="35" r="1.5" fill="#ffd54f"/>
</svg>
